<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <title>Duck Dash - Finish</title>
</head>
<body>

  <div class="game-screen">
    <img class="bg-image" src="images/Clouds.png" alt="sky background" />

    <div class="content">

      <div class="title-wrapper">
        <img class="title-img" src="images/titel.svg" alt="Duck Dash" />
      </div>

      <div class="title-duck-wrapper">
        <img class="title-duck-single" src="images/Duck.svg" alt="duck" />
      </div>

      <div class="instructions">
        <p class="welcome"><strong>Bedankt voor het spelen!</strong></p>
        <p>Jouw score:</p>
      </div>

      <div class="highscore-wrapper">
        <img class="hs-bg" src="images/highscore.svg" alt="" />
        <span class="hs-label" id="final-score">0</span>
      </div>

      <div class="highscore-wrapper" style="margin-top: 16px;">
        <img class="hs-bg" src="images/highscore.svg" alt="" />
        <span class="hs-label" id="finish-highscore">high score: 0</span>
      </div>

      <div class="start-text">
        <p>Je wordt zo teruggestuurd...</p>
      </div>

      <div class="credits">
        <p>Made by: Brozy Denayer</p>
        <p>Duck Dash v1.0</p>
      </div>

    </div>
  </div>

<script>
    // Get score from URL
    const params = new URLSearchParams(window.location.search);
    const score = params.get("score") || 0;
    const highscore = localStorage.getItem("highscore") || 0;

    // Update highscore if needed
    if (score > highscore) {
        localStorage.setItem("highscore", score);
    }

    document.getElementById("final-score").textContent = "jouw score: " + score;
    document.getElementById("finish-highscore").textContent = "high score: " + Math.max(score, highscore);

    // Go back to start after 5 seconds
    setTimeout(() => {
        window.location.href = "index.html";
    }, 5000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <title>Duck Dash</title>
</head>
<body>

  <div class="game-screen">
    <img class="bg-image" src="images/Clouds.png" alt="sky background" />

    <div class="content">

      <div class="leaderboard-icon">
        <img src="images/leaderboard.svg" alt="leaderboard" />
      </div>

      <div class="title-wrapper">
        <img class="title-img" src="images/titel.svg" alt="Duck Dash" />
      </div>

      <div class="title-duck-wrapper">
        <img class="title-duck-single" src="images/Duck.svg" alt="duck" />
      </div>

      <div class="instructions">
        <p class="welcome"><strong>Welkom bij Duck Dash!</strong></p>
        <p>Doe de startpose om het spel te starten!</p>
      </div>

      <div class="highscore-wrapper">
        <img class="hs-bg" src="images/highscore.svg" alt="" />
        <span class="hs-label" id="highscore-label">high score: 0</span>
      </div>

      <div class="start-text">
        <p>Doe de startpose om te beginnen!</p>
      </div>

      <!-- CAMERA -->
      <div class="camera-wrapper">
        <canvas id="canvas"></canvas>
      </div>

      <div class="credits">
        <p>Made by: Brozy Denayer</p>
        <p>Duck Dash v1.0</p>
      </div>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script>
  
    const URL = "https://teachablemachine.withgoogle.com/models/KKyE5O-sP/";

    let model, webcam, ctx, maxPredictions;
    let gameStarted = false;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 250;
        const flip = true;
        webcam = new tmPose.Webcam(size, size, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        canvas.width = size;
        canvas.height = size;
        ctx = canvas.getContext("2d");
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        // Draw camera feed
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
            }
        }

        // Check for "Start game" pose
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].className === "Start game" && prediction[i].probability > 0.9) {
                if (!gameStarted) {
                    gameStarted = true;
                    setTimeout(() => {
                        window.location.href = "game.html";
                    }, 500);
                }
            }
        }
    }
    // Laad highscore uit localStorage
    const savedHighscore = localStorage.getItem("highscore") || 0;
    document.getElementById("highscore-label").textContent = "high score: " + savedHighscore;

    window.addEventListener("load", init);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="game.css">
  <link rel="stylesheet" href="style.css">
  <title>Duck Dash - Game</title>
</head>
<body>

  <div class="game-screen">

    <img class="bg-image" src="images/background.svg" alt="game background" />

    <div class="content">

      <div class="highscore-wrapper2">
        <img class="hs-bg2" src="images/highscore.svg" alt="" />
        <span class="hs-label2" id="highscore-label">high score: 0</span>
      </div>

      <div class="score-display">
        <p class="score-number" id="score">0</p>
        <p class="score-label">score</p>
      </div>

      <div class="timer-display">
        <p class="timer-number" id="timer">30</p>
        <p class="timer-label">seconden</p>
      </div>

      <img class="duck-flying" id="duck" src="images/Duck.svg" alt="duck" />

      <img class="catapult" src="images/catapult.svg" alt="catapult" />
      <img class="stone" id="stone" src="images/stone.svg" alt="stone" />

      <!-- CAMERA -->
      <div class="camera-wrapper-game">
        <canvas id="canvas"></canvas>
      </div>

      <div class="credits">
        <p>Made by: Brozy Denayer</p>
        <p>Duck Dash v1.0</p>
      </div>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script>
    const URL = "https://teachablemachine.withgoogle.com/models/KKyE5O-sP/";

    let model, webcam, ctx, maxPredictions;
    let canShoot = true;
    let score = 0;
    let stoneFlying = false;

    let timeLeft = 30;
    let timerInterval = null;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 200;
        const flip = true;
        webcam = new tmPose.Webcam(size, size, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        canvas.width = size;
        canvas.height = size;
        ctx = canvas.getContext("2d");

        startTimer();
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
            }
        }

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].className === "Shoot" && prediction[i].probability > 0.90) {
                if (canShoot) {
                    canShoot = false;
                    shootStone();
                }
            }
        }
    }

    function shootStone() {
        if (stoneFlying) return;
        stoneFlying = true;
        canShoot = false;

        const stone = document.getElementById("stone");
        stone.style.transition = "bottom 0.8s linear";
        stone.style.bottom = "900px";

        let checkInterval = setInterval(() => {
            checkHit(stone);
        }, 50);

        setTimeout(() => {
            clearInterval(checkInterval);
            resetStone(stone);
        }, 900);
    }

    function checkHit(stone) {
        const stoneRect = stone.getBoundingClientRect();
        const duck = document.getElementById("duck");
        const duckRect = duck.getBoundingClientRect();

        const hit =
            stoneRect.left < duckRect.right &&
            stoneRect.right > duckRect.left &&
            stoneRect.top < duckRect.bottom &&
            stoneRect.bottom > duckRect.top;

        if (hit) {
          score++;
          document.getElementById("score").textContent = score;

          // Veren animatie op positie van de eend
          const duckRect = duck.getBoundingClientRect();
          const gameRect = document.querySelector(".game-screen").getBoundingClientRect();
          const x = duckRect.left - gameRect.left + duckRect.width / 2;
          const y = duckRect.top - gameRect.top + duckRect.height / 2;
          spawnFeathers(x, y);

          resetStone(stone);
        }
    }

    function spawnFeathers(x, y) {
      const gameScreen = document.querySelector(".game-screen");
      const feathers = ["🪶", "🪶", "🪶", "🪶", "🪶"];

      feathers.forEach((feather, i) => {
          const el = document.createElement("div");
          el.textContent = feather;
          el.style.position = "absolute";
          el.style.fontSize = "24px";
          el.style.left = x + "px";
          el.style.top = y + "px";
          el.style.zIndex = "999";
          el.style.pointerEvents = "none";
          el.style.transition = "all 0.8s ease";
          gameScreen.appendChild(el);

          // Random richting voor elke veer
          const angle = (i / feathers.length) * 360;
          const distance = 80 + Math.random() * 60;
          const rad = (angle * Math.PI) / 180;
          const tx = Math.cos(rad) * distance;
          const ty = Math.sin(rad) * distance;

          setTimeout(() => {
              el.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg)`;
              el.style.opacity = "0";
          }, 50);

          // Verwijder na animatie
          setTimeout(() => {
              el.remove();
          }, 900);
      });
    }
    

    function resetStone(stone) {
        stoneFlying = false;
        stone.style.transition = "none";
        stone.style.bottom = "25px";
        stone.style.left = "calc(50% - 20px)";

        setTimeout(() => {
            canShoot = true;
        }, 1500);
    }

    function startTimer() {
      timerInterval = setInterval(() => {
          timeLeft--;
          const timerEl = document.getElementById("timer");
          timerEl.textContent = timeLeft;

          if (timeLeft <= 5) {
              timerEl.style.color = "red";
          }

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            canShoot = false;
            setTimeout(() => {
                window.location.href = "end.html?score=" + score;
            }, 1000);
          }
      }, 1000);
    }

    const savedHighscore = localStorage.getItem("highscore") || 0;
    document.getElementById("highscore-label").textContent = "high score: " + savedHighscore; 

    window.addEventListener("load", init);
</script>

</body>
</html>

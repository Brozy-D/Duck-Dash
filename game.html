<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="game.css">
  <link rel="stylesheet" href="style.css">
  <title>Duck Dash - Game</title>
</head>
<body>

  <div class="game-screen">

    
    <img class="bg-image" src="images/background.svg" alt="game background" />

    <div class="content">

      
        <div class="highscore-wrapper2">
            <img class="hs-bg2" src="images/highscore.svg" alt="" />
            <span class="hs-label2">high score: 32</span>
        </div>

        <div>
            <a href="index.html">🏠</a>
        </div>

      
      <div class="score-display">
        <p class="score-number">0</p>
        <p class="score-label">score</p>
      </div>

      
      <img class="duck-flying" src="images/Duck.svg" alt="duck" />

      
      <img class="catapult" src="images/catapult.svg" alt="catapult" />
      <img class="stone" src="images/stone.svg" alt="stone" />


      
      <div class="credits">
        <p>Made by: Brozy Denayer</p>
        <p>Duck Dash v1.0</p>
      </div>

    </div>
  </div>

</body>
</html>
